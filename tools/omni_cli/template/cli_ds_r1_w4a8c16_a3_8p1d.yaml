            ASDOPS_LOG_TO_BOOST_TYPE: atb
            ASDOPS_LOG_TO_FILE: 1
            ASDOPS_LOG_TO_FILE_FLUSH: 0
            ASDOPS_LOG_TO_STDOUT: 0
            ASDSIP_HOME_PATH: /usr/local/Ascend/nnal/asdsip/latest/
