            ACCESS_LOG_FILE: /tmp/glm5/logs/nginx/nginx_access.log
            OMNI_PROXY_PD_POLICY: sequential
            OMNI_PROXY_MAX_BATCH_NUM_TOKEN: 200000
            OMNI_PROXY_PREFILL_MAX_NUM_SEQS: 16
            OMNI_PROXY_DECODE_MAX_NUM_SEQS: 6
