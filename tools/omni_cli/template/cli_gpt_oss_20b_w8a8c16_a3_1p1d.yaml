              max-num-seqs: 64
            gpu-util: '0.88'
            kv-transfer-config:
              engine_id: $KV_RANK
              kv_buffer_device: npu
              kv_connector: AscendHcclConnectorV1
              kv_parallel_size: $DECODE_TENSOR_PARALLEL_SIZE
              kv_rank: $KV_RANK
              kv_role: kv_producer
            log-dir: $LOG_PATH
            master-ip: $HOST_IP
            master-port: $MASTER_PORT
            max-model-len: $MODEL_LEN_MAX_PREFILL
            model-path: $MODEL_PATH
            num-dp: 1
