---
# Service for Proxy Pod
apiVersion: v1
kind: Service
metadata:
  name: global-proxy-service
  labels: {{- include "omniinfer.labels" . | nindent 4 }}
spec:
  selector:
    app: global-proxy
  ports:
    - protocol: TCP
      port: {{ .Values.routerSpec.servicePort }}
      targetPort: {{ .Values.routerSpec.proxyPort }}
  type: LoadBalancer # 或 ClusterIP/NodePort 根据需要