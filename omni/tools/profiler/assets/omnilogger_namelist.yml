type: "marker"
targets:
  - module: "vllm.entrypoints.openai.serving_engine:OpenAIServing"
    function_name: _preprocess_chat
    entry_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from omni.tools.profiler.trace.tracing import create_span, parent_ctx_var
      request_id = args[0].req_id
      if os.getenv('ROLE') == "prefill":
          if parent_ctx_var.get() is not None: 
              timestamp = time.time_ns()
              create_span(start_time_ns=0, end_time=timestamp, action_name="Get prefill engine request and start pickle", request_id=request_id, ip_str=ip_str, ctx_flag= True, trace_headers=None,) 

          safe_print(trace_output_directory, f"<<<Action: Get prefill engine request and start pickle; Timestamp:{time.time()}; RequestID:{request_id}; Role:{os.getenv('ROLE')}_{ip_str}")
    exit_operation: |
      import os, time
      from omni.tools.profiler.trace.tracing import create_span, parent_ctx_var
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      request_id = args[0].req_id
      if os.getenv('ROLE') == "prefill":
          if parent_ctx_var.get() is not None: 
              timestamp = time.time_ns()
              create_span(start_time_ns=0, end_time=timestamp, action_name="Finish process request in prefill engine",request_id=request_id, ip_str=ip_str, ctx_flag=True, trace_headers=None,)
          safe_print(trace_output_directory, f"<<<Action: Finish process request in prefill engine; Timestamp:{time.time()}; RequestID:{request_id}; Role:{os.getenv('ROLE')}_{ip_str}")

  - module: "vllm.entrypoints.openai.serving_chat:OpenAIServingChat"
    function_name: create_chat_completion
    entry_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      request_id = "chatcmpl-" + args[1].headers.get('X-Request-Id')
      args[0].req_id = request_id
      from omni.tools.profiler.trace.tracing import parent_ctx_var, span_start_time, create_span, clean_ctx
      from vllm.logger import init_logger
      import logging, time
      logging.basicConfig(level=logging.DEBUG)
      logger = init_logger(__name__)
      from opentelemetry.trace.propagation.tracecontext import TraceContextTextMapPropagator
      clean_ctx()
      if os.getenv('ROLE') == "prefill":
          trace_headers = {"traceparent": args[1].headers.get("Traceparent")}
          if trace_headers.get('traceparent') is not None:
              timestamp = time.time_ns()          
              current_ctx = TraceContextTextMapPropagator().extract(trace_headers)
              header_start_time = args[1].headers.get("Start_time_ns")
              start_time = int(header_start_time)

              logger.info(f"***** PD api server get request, req_id:{request_id}, start_time:{start_time}, timestamp:{timestamp}")
              parent_ctx_var.set(current_ctx)
              span_start_time.set(start_time)

              create_span(start_time_ns=0, end_time=timestamp, action_name="PD api server get request", request_id=request_id, ip_str=ip_str, ctx_flag= True, trace_headers=None,)
          logger.info(f"***** PD api server get request, req_id:{request_id}, trace_headers:{trace_headers}")
          safe_print(trace_output_directory, f"<<<Action: PD api server get request; Timestamp:{time.time()}; RequestID:{request_id}; Role:{os.getenv('ROLE')}_{ip_str}")
      else:
          trace_headers = {"traceparent": args[1].headers.get("Traceparent")}
          if trace_headers.get('traceparent') is not None:
              timestamp = time.time_ns()
              header_start_time = args[1].headers.get("Start_time_ns")
              start_time = int(header_start_time)
              
              logger.info(f"***** Enter decode to generate, req_id:{request_id}, trace_headers:{trace_headers}, start_time: {start_time}, end_time:{timestamp}, start_time-end_time={start_time-timestamp}")
              create_span(start_time_ns=start_time, end_time=timestamp, action_name="Enter decode to generate", request_id=request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
          safe_print(trace_output_directory, f"<<<Action: Enter decode to generate; Timestamp:{time.time()}; RequestID:{request_id}; Role:{os.getenv('ROLE')}_{ip_str}")

  - module: "vllm.v1.core.sched.scheduler:Scheduler"
    function_name: add_request
    entry_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from omni.tools.profiler.trace.tracing import create_span
      from opentelemetry.trace.propagation.tracecontext import TraceContextTextMapPropagator
      if os.getenv('ROLE') == "prefill":
        if args[0].trace_headers:
            start_time = int(args[0].trace_headers.get("start_time_ns"))
            trace_headers = {"traceparent": args[0].trace_headers["traceparent"]}
            timestamp = time.time_ns()
            ctx = create_span(start_time_ns=start_time, end_time=timestamp, action_name="Prefill add waiting queue", request_id=args[0].request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
            carrier = {}
            TraceContextTextMapPropagator().inject(carrier, context=ctx)
            carrier['start_time_ns'] = str(timestamp)
            args[0].trace_headers = carrier
        safe_print(trace_output_directory, f"<<<Action: Prefill add waiting queue; Timestamp:{time.time()}; RequestID:{args[0].request_id}; Role:{os.getenv('ROLE')}_{ip_str}")

