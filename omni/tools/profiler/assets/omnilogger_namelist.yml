  - module: "vllm.v1.engine.core:EngineCoreProc"
    function_name: process_input_socket
    entry_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from vllm.v1.engine import EngineCoreRequestType
      from opentelemetry.trace.propagation.tracecontext import TraceContextTextMapPropagator
      from omni.tools.profiler.trace.tracing import create_span, parent_ctx_var, clean_ctx
      def patch_queue_put_nowait(queue):
          original_put_nowait = queue.put_nowait
          def patched_put_nowait(item):
              request_type, request = item
              if request_type == EngineCoreRequestType.ADD:
                  if os.getenv('ROLE') == "prefill":
                      traceparent = request.trace_headers.get('traceparent') if request.trace_headers else None
                      if traceparent is not None:
                          start_time = int(request.trace_headers.get("start_time_ns"))
                          trace_headers = {"traceparent": request.trace_headers["traceparent"]}
                          timestamp = time.time_ns()
                          ctx = create_span(start_time_ns=start_time, end_time=timestamp, action_name="Start process request in prefill engine", request_id=request.request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
                          carrier = {}
                          TraceContextTextMapPropagator().inject(carrier, context=ctx)
                          carrier['start_time_ns'] = str(timestamp)
                          request.trace_headers = carrier
                      safe_print(trace_output_directory, f"<<<Action: Start process request in prefill engine; Timestamp:{time.time()}; RequestID:{request.request_id}; Role:{os.getenv('ROLE')}_{ip_str}")
                  else:
                      traceparent = request.trace_headers.get('traceparent') if request.trace_headers else None
                      clean_ctx()
                      if traceparent is not None:
                          start_time = int(request.trace_headers.get("start_time_ns"))
                          trace_headers = {"traceparent": request.trace_headers["traceparent"]}
                          timestamp = time.time_ns()
                          ctx = create_span(start_time_ns=start_time, end_time=timestamp, action_name="Start to dispatch decode request", request_id=request.request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
                          carrier = {}
                          TraceContextTextMapPropagator().inject(carrier, context=ctx)
                          carrier['start_time_ns'] = str(timestamp)
                          carrier['ttft_start_time'] = request.trace_headers.get('ttft_start_time')
                          carrier['ttft_traceparent'] = request.trace_headers.get('ttft_traceparent')
                          request.trace_headers = carrier
                      safe_print(trace_output_directory, f"<<<Action: Start to dispatch decode request; Timestamp:{time.time()}; RequestID:{request.request_id}; Role:{os.getenv('ROLE')}_{ip_str}")
              original_put_nowait(item)
          queue.put_nowait = patched_put_nowait
          return queue
      self.input_queue = patch_queue_put_nowait(self.input_queue)

  - module: "vllm.v1.engine.core:EngineCoreProc"
    function_name: process_output_socket
    entry_operation: |
      import os, time
      import queue
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from omni.tools.profiler.trace.tracing import create_span
      from opentelemetry.trace.propagation.tracecontext import TraceContextTextMapPropagator
      from omni.tools.profiler.apply_profiler_patches import patch_enginecoreoutput
      patch_enginecoreoutput()
      def patch_queue_get(queue):
          original_get = queue.get
          def patch_get():
              value = original_get()
              for request in getattr(value, 'outputs', []):
                  if os.getenv('ROLE') == "prefill":
                      if request.trace_headers:
                          start_time = int(request.trace_headers.get("start_time_ns"))
                          trace_headers = {"traceparent": request.trace_headers["traceparent"]}
                          timestamp = time.time_ns()
                          ctx = create_span(start_time_ns=start_time, end_time=timestamp, action_name="Start to send output in prefill stage", request_id=request.request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
                          carrier = {}
                          TraceContextTextMapPropagator().inject(carrier, context=ctx)
                          carrier['start_time_ns'] = str(timestamp)
                          request.trace_headers = carrier

                      safe_print(trace_output_directory, f"<<<Action: Start to send output in prefill stage; Timestamp:{time.time()}; RequestID:{request.request_id}; Role:{os.getenv('ROLE')}_{ip_str}")
              return value
          queue.get = patch_get
          return queue
      self.output_queue = patch_queue_get(self.output_queue)

