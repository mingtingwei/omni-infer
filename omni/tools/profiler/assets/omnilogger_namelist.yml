  - module: "vllm.v1.core.sched.scheduler:Scheduler"
    function_name: schedule
    entry_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from omni.tools.profiler.trace.tracing import create_span
      from opentelemetry.trace.propagation.tracecontext import TraceContextTextMapPropagator
      class CustomList(list):
          def __init__(self, scheduler_instance, iterable=()):
              super().__init__(iterable)
              self.scheduler = scheduler_instance        
          def append(self, item):
              if os.getenv('ROLE') == "prefill":
                  if item.trace_headers:
                      start_time = int(item.trace_headers.get("start_time_ns"))
                      trace_headers = {"traceparent": item.trace_headers["traceparent"]}
                      timestamp = time.time_ns()
                      ctx = create_span(start_time_ns=start_time, end_time=timestamp, action_name="success add to seq groups", request_id=item.request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
                      carrier = {}
                      TraceContextTextMapPropagator().inject(carrier, context=ctx)
                      carrier['start_time_ns'] = str(timestamp)
                      item.trace_headers = carrier
                  safe_print(trace_output_directory, f"<<<Action: success add to seq groups; Timestamp:{time.time()}; RequestID:{item.request_id}; Role:{os.getenv('ROLE')}_{ip_str}")
              else:
                  headers = self.scheduler.finished_recving_kv_req_headers.pop(item.request_id, None)
                  if headers and headers.get('traceparent') is not None:
                      start_time = int(headers.get("start_time_ns"))
                      trace_headers = {"traceparent": headers["traceparent"]}
                      timestamp = time.time_ns()
                      ctx = create_span(start_time_ns=start_time, end_time=timestamp, action_name="Start append running sequece for decode", request_id=item.request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
                      carrier = {}
                      TraceContextTextMapPropagator().inject(carrier, context=ctx)
                      carrier['start_time_ns'] = str(timestamp)
                      carrier['ttft_start_time'] = headers.get('ttft_start_time')
                      carrier['ttft_traceparent'] = headers.get('ttft_traceparent')
                      item.trace_headers = carrier
                  safe_print(trace_output_directory, f"<<<Action: Start append running sequece for decode; Timestamp:{time.time()}; RequestID:{item.request_id}; Role:{os.getenv('ROLE')}_{ip_str}")
              super().append(item)
      self.running = CustomList(scheduler_instance=self, iterable=self.running)

      for request in self.waiting:
          if request.request_id not in self.traced_waiting_ids:
              if os.getenv('ROLE') == "prefill":
                  if request.trace_headers:
                      start_time = int(request.trace_headers.get("start_time_ns"))
                      trace_headers = {"traceparent": request.trace_headers["traceparent"]}
                      timestamp = time.time_ns()
                      ctx = create_span(start_time_ns=start_time, end_time=timestamp, action_name="try to schedule in waiting queue", request_id=request.request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
                      carrier = {}
                      TraceContextTextMapPropagator().inject(carrier, context=ctx)
                      carrier['start_time_ns'] = str(timestamp)
                      request.trace_headers = carrier
                      self.traced_waiting_ids[request.request_id] = None
                      if len(self.traced_waiting_ids) > 1000:
                          self.traced_waiting_ids.popitem(last=False) 
          safe_print(trace_output_directory, f"<<<Action: try to schedule in waiting queue; Timestamp:{time.time()}; RequestID:{request.request_id}; Role:{os.getenv('ROLE')}_{ip_str}")          
    exit_operation: |
      self.schedule_output = result # for accessing schedule_output in engine core

