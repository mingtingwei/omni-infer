  # Prefill free kv blocks
  - module: "vllm.v1.core.sched.scheduler:Scheduler"
    function_name: _update_from_kv_xfer_finished
    entry_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from omni.tools.profiler.trace.tracing import create_span
      from vllm.logger import init_logger
      import logging, time
      logging.basicConfig(level=logging.DEBUG)
      logger = init_logger(__name__)
      for req_id in (args[0].finished_sending or ()):
          if req_id in self.requests and req_id not in self._cached_reqs_data:
              headers = args[0].finished_sending_headers.pop(req_id, None)
              if headers and headers.get('traceparent'):
                  start_time = int(headers.get("start_time_ns"))
                  trace_headers = {"traceparent": headers["traceparent"]}
                  timestamp = time.time_ns()
                  logger.info(f"**** Prefill free kv blocks, req_id:{req_id}, headers:{headers} at {time.time()}")
                  if start_time<timestamp:
                      create_span(start_time_ns=start_time, end_time=timestamp, action_name="Prefill free kv blocks", request_id=req_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
              safe_print(trace_output_directory, f"<<<Action: Prefill free kv blocks; Timestamp:{time.time()}; RequestID:{req_id}; Role:{os.getenv('ROLE')}_{ip_str}")

  # start pull kv. llmdatadist_connector_v1/llmdatadist_connector_d2p
  - module: "omni.accelerators.pd.llmdatadist_connector_v1:DecodeConnectorWorker"
    function_name: _read_blocks
    entry_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from omni.tools.profiler.trace.tracing import create_span, ttft_start_time, ttft_trace_id
      request_id = kwargs['request_id']
      headers = kwargs.get('trace_headers') or getattr(self, 'trace_headers', None)
      if headers and headers.get('traceparent') is not None:
          start_time = int(headers.get("start_time_ns"))
          trace_headers = {"traceparent": headers["traceparent"]}
          timestamp = time.time_ns()
          create_span(start_time_ns=start_time, end_time=timestamp, action_name="Start pull kv", request_id=request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
          ttft_start_time.set(headers.get('ttft_start_time'))
          ttft_trace_id.set(headers.get('ttft_traceparent'))
      safe_print(trace_output_directory, f"<<<Action: Start pull kv; Timestamp:{time.time()}; RequestID:{request_id}; Role:{os.getenv('ROLE')}_{ip_str}")

  # finish pull kv. llmdatadist_connector_v1/llmdatadist_connector_d2p
  - module: "omni.accelerators.pd.llmdatadist_connector_v1:DecodeConnectorWorker"
