      from opentelemetry.trace.propagation.tracecontext import TraceContextTextMapPropagator
      request_id = args[1][0]['remote_request_id']
      if parent_ctx_var.get() is not None: 
          timestamp = time.time_ns()
          ctx = create_span(start_time_ns=0, end_time=timestamp, action_name="Finish pull kv", request_id=request_id, ip_str=ip_str, ctx_flag=True, trace_headers=None,)
          carrier = {}
          TraceContextTextMapPropagator().inject(carrier, context=ctx)
          carrier['start_time_ns'] = str(timestamp)
          carrier['ttft_start_time'] = ttft_start_time.get()
          carrier['ttft_traceparent'] = ttft_trace_id.get()
          args[1][0]['trace_headers'] = carrier
      clean_ctx()
      safe_print(trace_output_directory, f"<<<Action: Finish pull kv; Timestamp:{time.time()}; RequestID:{request_id}; Role:{os.getenv('ROLE')}_{ip_str}")

