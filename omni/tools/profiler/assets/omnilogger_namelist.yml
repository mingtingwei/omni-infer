  - module: "vllm.v1.serial_utils:MsgpackDecoder"
    function_name: decode
    exit_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from vllm.v1.engine import EngineCoreOutputs
      if isinstance(result, EngineCoreOutputs) and os.getenv('ROLE') == "prefill":
          for request in getattr(result, 'outputs', []):
              safe_print(trace_output_directory, f"<<<Action: Client get prefill output; Timestamp:{time.time()}; RequestID:{request.request_id}; Role:{os.getenv('ROLE')}_{ip_str}")

  - module: "vllm.v1.engine.core_client:AsyncMPClient"
    function_name: get_output_async
    exit_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from vllm.logger import init_logger
      import logging, time
      logging.basicConfig(level=logging.DEBUG)
      logger = init_logger(__name__)
      from vllm.v1.engine import EngineCoreOutputs
      from omni.tools.profiler.trace.tracing import parent_ctx_var, create_span
      from opentelemetry.trace.propagation.tracecontext import TraceContextTextMapPropagator
      if isinstance(result, EngineCoreOutputs) and os.getenv('ROLE') == "prefill":
          for request in getattr(result, 'outputs', []):
              if request.trace_headers:
                start_time = int(request.trace_headers.get("start_time_ns"))
                trace_headers = {"traceparent": request.trace_headers["traceparent"]}
                timestamp = time.time_ns()
                ctx = create_span(start_time_ns=start_time, end_time=timestamp, action_name="Finish prefill pickle and start response", request_id=request.request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
              
                carrier = {}
                TraceContextTextMapPropagator().inject(carrier, context=ctx)
                carrier['start_time_ns'] = str(timestamp)
                request.trace_headers = carrier
                logger.info(f"<<< Finish prefill pickle and start response, req_id:{request.request_id}, trace_headers:{request.trace_headers}")

              safe_print(trace_output_directory, f"<<<Action: Finish prefill pickle and start response; Timestamp:{time.time()}; RequestID:{request.request_id}; Role:{os.getenv('ROLE')}_{ip_str}")

  - module: "vllm.v1.core.kv_cache_manager:KVCacheManager"
    function_name: allocate_slots
    exit_operation: |
      import os, time
      from omni.tools.profiler.utils import ip_str, safe_print, trace_output_directory
      from omni.tools.profiler.trace.tracing import create_span
      from opentelemetry.trace.propagation.tracecontext import TraceContextTextMapPropagator
      load_kv_async = False
      if "delay_cache_blocks" in kwargs:
          load_kv_async = kwargs['delay_cache_blocks']
          if result and load_kv_async == False and os.getenv('ROLE') == "prefill": # block is not-none
              if args[0].trace_headers:
                  start_time = int(args[0].trace_headers.get("start_time_ns"))
                  trace_headers = {"traceparent": args[0].trace_headers["traceparent"]}
                  timestamp = time.time_ns()
                  ctx = create_span(start_time_ns=start_time, end_time=timestamp, action_name="Prefill get new_blocks", request_id=args[0].request_id, ip_str=ip_str, ctx_flag=False, trace_headers=trace_headers,)
                  carrier = {}
                  TraceContextTextMapPropagator().inject(carrier, context=ctx)
                  carrier['start_time_ns'] = str(timestamp)
                  args[0].trace_headers = carrier
              safe_print(trace_output_directory, f"<<<Action: Prefill get new_blocks; Timestamp:{time.time()}; RequestID:{args[0].request_id}; Role:{os.getenv('ROLE')}_{ip_str}")
          elif result and load_kv_async: #delay_cache_blocks is True
              safe_print(trace_output_directory, f"<<<Action: Add need pulling sequence; Timestamp:{time.time()}; RequestID:{args[0].request_id}; Role:{os.getenv('ROLE')}_{ip_str}")
