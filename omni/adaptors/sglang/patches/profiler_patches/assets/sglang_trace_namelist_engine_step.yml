type: "marker"
base_params: { }
targets:
  # step
  - module: "sglang.srt.managers.scheduler:Scheduler"
    function_name: "get_new_batch_prefill"
    scope: "sglang.srt.disaggregation.prefill:Scheduler"
    scope_function: "event_loop_overlap_disagg_prefill"
    entry_operation: |
      self.prefill_start_free_block_num = len(self.token_to_kv_pool_allocator.free_pages) + len(self.token_to_kv_pool_allocator.release_pages)

  - module: "sglang.srt.managers.scheduler:Scheduler"
    function_name: "_profile_batch_predicate"
    scope: "sglang.srt.managers.scheduler:Scheduler"
    scope_function: "run_batch"
    entry_operation: |
      import os, time
      from omni.adaptors.sglang.patches.profiler_patches.omni_logger import omni_logger_is_prefilling, omni_logger_print_timestamp, omni_logger_enable, omni_logger_print
      
      if omni_logger_enable():
          engine_step_start_time = time.time()
          if omni_logger_is_prefilling():
              start_free_block_num = self.prefill_start_free_block_num
          else:
              start_free_block_num = (
                  len(self.token_to_kv_pool_allocator.free_pages)
                  + len(self.token_to_kv_pool_allocator.release_pages)
              )
          execute_model_start_time = engine_step_start_time
          if not omni_logger_is_prefilling():
              batch.engine_core_str = f'{os.getpid()}|{execute_model_start_time}'
              
  - module: "sglang.srt.model_executor.forward_batch_info"
    function_name: "enable_num_token_non_padded"
    scope: "sglang.srt.model_executor.forward_batch_info:ForwardBatch"
    scope_function: "init_new"
    exit_operation: |
      ret.engine_core_str = batch.engine_core_str


  - module: "sglang.srt.model_executor.model_runner:ModelRunner"
    function_name: "_forward_raw"
    scope: "sglang.srt.model_executor.model_runner:ModelRunner"
    scope_function: "forward"
    entry_operation: |
      import os, time
      from omni.adaptors.sglang.patches.profiler_patches.omni_logger import omni_logger_is_prefilling, omni_logger_print_timestamp, omni_logger_enable, omni_logger_print
      if omni_logger_enable() and not omni_logger_is_prefilling():
          omni_logger_print(f'profile: worker_step start:{forward_batch.engine_core_str}|model_step={self.forward_pass_id}')


  - module: "sglang.srt.managers.tp_worker_overlap_thread:TpModelWorkerClient"
    function_name: "forward_batch_generation"
    scope: "sglang.srt.managers.scheduler:Scheduler"
    scope_function: "run_batch"
    entry_operation: |
      import os, time
      from omni.adaptors.sglang.patches.profiler_patches.omni_logger import omni_logger_is_prefilling, omni_logger_print_timestamp, omni_logger_enable, omni_logger_print

      step_info_dict = {}
      if omni_logger_enable():
          running_reqs_num_after_step = self.running_batch.batch_size()
          waiting_reqs_num_after_step = len(self.waiting_queue)
          if omni_logger_is_prefilling():
              running_reqs_num_after_step += batch.batch_size()

          total_tokens = 0
          reqs_ids = []
          bs_tokens = []

          for req in batch.reqs:
              reqs_ids.append(req.bootstrap_room)
              total_tokens += len(req.origin_input_ids)
              bs_tokens.append(len(req.origin_input_ids))
          if not omni_logger_is_prefilling():
              for req in batch.reqs:
                  total_tokens += len(req.output_ids)

          # self.req_to_token_pool.size
          kv_blocks_num = self.token_to_kv_pool_allocator.num_pages  
          # self.req_to_token_pool.available_size()
          end_free_block_num = len(self.token_to_kv_pool_allocator.free_pages) + len(self.token_to_kv_pool_allocator.release_pages)
          cost_blocks_num = start_free_block_num - end_free_block_num
          kv_cache_usage = 1.0 - (end_free_block_num / kv_blocks_num)
          if total_tokens != 0:
              step_info_dict = {
                  "running_reqs_num_after_step": running_reqs_num_after_step,
                  "total_tokens": total_tokens,
                  "waiting_reqs_num_after_step": waiting_reqs_num_after_step,
                  "reqs_ids": reqs_ids,
                  "bs_tokens": bs_tokens,
                  "kv_cache_usage": kv_cache_usage,
                  "kv_blocks_num": kv_blocks_num,
                  "start_free_block_num": start_free_block_num,
                  "end_free_block_num": end_free_block_num,
                  "cost_blocks_num": cost_blocks_num,
                  "engine_core_str": batch.engine_core_str,
              }
          model_worker_batch.step_info_dict = step_info_dict

  - module: "sglang.srt.speculative.mtp_worker:MTPWorker"
    function_name: "forward_batch_speculative_generation"
    scope: "sglang.srt.managers.tp_worker_overlap_thread:TpModelWorkerClient"
    scope_function: "forward_thread_func_"
    entry_operation: |
      import os, time 
      from omni.adaptors.sglang.patches.profiler_patches.omni_logger import omni_logger_is_prefilling, omni_logger_print_timestamp, omni_logger_enable, omni_logger_print

      for req in model_worker_batch.reqs:
          if omni_logger_enable() and omni_logger_is_prefilling():
              omni_logger_print_timestamp(req.bootstrap_room, 'p_9 开始执行Run forward')

      if omni_logger_enable():
          engine_step_start_time = time.time()
          execute_model_start_time = engine_step_start_time   

      step_info_dict = model_worker_batch.step_info_dict

    exit_operation: |
      import os, time
      from omni.adaptors.sglang.patches.profiler_patches.omni_logger import omni_logger_is_prefilling, omni_logger_print_timestamp, omni_logger_enable, omni_logger_print
      try:
        if omni_logger_enable() and step_info_dict:
            engine_step_finish_time = time.time()
            execute_model_end_time = engine_step_finish_time
            engine_step_execute_cost = (engine_step_finish_time - engine_step_start_time) * 1000
            execute_model_cost_time = (execute_model_end_time - execute_model_start_time) * 1000 
            
            total_tokens = step_info_dict.get("total_tokens")
            if total_tokens != 0:
                running_reqs_num_after_step = step_info_dict.get("running_reqs_num_after_step")
                waiting_reqs_num_after_step = step_info_dict.get("waiting_reqs_num_after_step")
                reqs_ids = step_info_dict.get("reqs_ids")
                bs_tokens = step_info_dict.get("bs_tokens")
                kv_cache_usage = step_info_dict.get("kv_cache_usage")
                kv_blocks_num = step_info_dict.get("kv_blocks_num")
                start_free_block_num = step_info_dict.get("start_free_block_num")
                end_free_block_num = step_info_dict.get("end_free_block_num")
                engine_core_str = step_info_dict.get("engine_core_str")
                cost_blocks_num = step_info_dict.get("cost_blocks_num")
                omni_logger_print(
                    f"profile: engine_step start:{engine_step_start_time}|finish:{engine_step_finish_time}|execute time:{engine_step_execute_cost}"
                    f"|seqs:{running_reqs_num_after_step}|tokens:{total_tokens}|{waiting_reqs_num_after_step=}|{reqs_ids=}|{bs_tokens=}|{execute_model_start_time=}|{execute_model_end_time=}|{execute_model_cost_time=}"
                    f"|{kv_cache_usage=}|{kv_blocks_num=}|{start_free_block_num=}|{end_free_block_num=}|{cost_blocks_num=}|{engine_core_str=}")

        for req in model_worker_batch.reqs:
            if omni_logger_enable() and omni_logger_is_prefilling():
                omni_logger_print_timestamp(req.bootstrap_room, 'p_9 结束执行Run forward')

      except Exception as e:
        print(f"forward_batch_generation, exit_opt error：{e}", flush=True)
        raise